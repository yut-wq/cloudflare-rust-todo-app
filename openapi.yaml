openapi: 3.0.3
info:
  title: TODO API
  description: Rust Worker上で動作するシンプルなTODO管理API
  version: 1.0.0
  contact:
    name: TODO API Support
servers:
  - url: https://my-rust-worker.your-subdomain.workers.dev
    description: 本番環境
  - url: http://localhost:8787
    description: 開発環境

paths:
  /:
    get:
      summary: ルートエンドポイント
      description: APIサーバーの基本情報を返す
      responses:
        "200":
          description: APIサーバー情報
          content:
            text/plain:
              schema:
                type: string
                example: "TODO API Server"

  /api/todos:
    get:
      summary: TODO一覧取得
      description: 保存されているすべてのTODOを取得
      responses:
        "200":
          description: TODO一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"
              examples:
                example1:
                  value:
                    - id: 1708781445000
                      text: "食材を買いに行く"
                      completed: false
                    - id: 1708781450000
                      text: "レポートを書く"
                      completed: true

    post:
      summary: TODO作成
      description: 新しいTODOを作成
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTodoRequest"
            examples:
              example1:
                value:
                  text: "新しいタスク"
      responses:
        "200":
          description: 作成されたTODO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "400":
          description: 不正なリクエスト（テキストが空など）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/todos/{id}:
    put:
      summary: TODO更新
      description: 指定されたIDのTODOの完了状態を更新
      parameters:
        - name: id
          in: path
          required: true
          description: 更新するTODOのID
          schema:
            type: integer
            format: int64
            example: 1708781445000
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTodoRequest"
            examples:
              complete:
                summary: TODOを完了にする
                value:
                  completed: true
              incomplete:
                summary: TODOを未完了にする
                value:
                  completed: false
      responses:
        "200":
          description: 更新されたTODO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Todo"
        "404":
          description: TODOが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      summary: TODO削除
      description: 指定されたIDのTODOを削除
      parameters:
        - name: id
          in: path
          required: true
          description: 削除するTODOのID
          schema:
            type: integer
            format: int64
            example: 1708781445000
      responses:
        "204":
          description: 削除成功
        "404":
          description: TODOが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Todo:
      type: object
      required:
        - id
        - text
        - completed
      properties:
        id:
          type: integer
          format: int64
          description: TODO ID（Unix時刻のミリ秒）
          example: 1708781445000
        text:
          type: string
          description: TODOのテキスト内容
          example: "食材を買いに行く"
        completed:
          type: boolean
          description: 完了状態
          example: false

    CreateTodoRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: 新しいTODOのテキスト
          minLength: 1
          example: "新しいタスク"

    UpdateTodoRequest:
      type: object
      required:
        - completed
      properties:
        completed:
          type: boolean
          description: 更新後の完了状態
          example: true

    Error:
      type: object
      properties:
        message:
          type: string
          description: エラーメッセージ
          example: "リクエストが不正です"

tags:
  - name: todos
    description: TODO管理API
